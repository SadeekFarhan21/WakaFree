name: Sync WakaTime data

on:
  schedule:
    # Every 20 minutes; GitHub may delay runs by a few minutes under load
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync (last 2 days)
        run: |
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://wakafree.farhansadeek.com/api/wakatime/sync?days=2&meta=0&secret=${{ secrets.WAKAFREE_SYNC_SECRET }}")
          cat /tmp/resp.json
          [ "$code" = "200" ] || { echo "Sync failed with HTTP $code"; exit 1; }
